- title: Multimodal modeling
  subtitle: Combine neural, behavioral, and glucose signals in a single representation
  image: images/projects/JointModeling.png
  description: Our goal is to leverage behavioral representations as a unifying feature to combine neural activity and physiological measurements across diverse experimental conditions and disease states.
  repo: thebowenlab
  tags:
    - resource

- title: Forecasting during disease
  subtitle: How are network states impacted as diabetic hyperglycemia develops?
  image: images/projects/Diabetes.png
  description: We're collaborating with the Schwartz and Sweet labs at UWMDI to examine how neural forecasting of blood glucose changes as metabolic disease develops -- and whether existing and novel therapies revert towards a healthier state.
  repo: thebowenlab
  tags:
    - resource
    - publication

- title: Sensory routes
  subtitle: Role of distinct input nodes in glucose predictions
  image: images/projects/nodes_for_predictions.png
  description: We're testing how different taste and gut-derived sensory modalities integrate with external information to build glycemic predictions.
  repo: thebowenlab
  tags:
    - resource
